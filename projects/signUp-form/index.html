<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
  
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="formContainer">


        <div class="backgroundIMG">

            <img src="./logan-voss.jpg" alt="Background Image" height="670" width="250">

            <h5> Photo by <a href="#">Logan Voss</a> on <a href="#">Unsplash</a></h5>

        </div>


        <div class="textSection">


            <div class="textArea">
                <h4>This is not a real online service! You know you need something like this in your life to help you
                    realize
                    your deepest dreams
                    <p>Sign up <em>now</em> to get started.</p>
                </h4>

                <h4> You <em>know</em> you want to. </h4>

            </div>

            <div class="formArea">

                <h4>Let's do this! </h4>

                <label for="first_name"> FIRST NAME</label>
                <input type="text" id="first_name" name="first_name">


                <label for="last_name"> LAST NAME</label>
                <input type="text" id="last_name" name="last_name">


                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email">


                <label for="password"> PASSWORD</label>
                <input type="password" id="password1" name="password">

                <label for="confirm_password"> CONFIRM PASSWORD</label>
                <input type="password" id="confirm_password" name="password">

            </div>


            <div class="buttonArea">

                <button type="submit"> Create Account</button>


                <h5>Already have an account? <a href="#">Log in</a></h5>

            </div>

        </div>


    </div>








    <script src="index.js"></script>
</body>

</html>
